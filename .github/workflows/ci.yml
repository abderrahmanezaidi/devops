name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: abderrahmanezaidi

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app2-api
        uses: docker/build-push-action@v5
        with:
          context: ./app2-api
          push: true
          tags: |
            ghcr.io/abderrahmanezaidi/app2-api:${{ github.sha }}
            ghcr.io/abderrahmanezaidi/app2-api:latest

      - name: Build & push app1-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app1-frontend
          push: true
          tags: |
            ghcr.io/abderrahmanezaidi/app1-frontend:${{ github.sha }}
            ghcr.io/abderrahmanezaidi/app1-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show manifests ready for deployment
        run: |
          echo "=== Manifests prets pour deploiement k3s ==="
          ls k8s/
          echo "=== Images deployees ==="
          echo "ghcr.io/abderrahmanezaidi/app1-frontend:latest"
          echo "ghcr.io/abderrahmanezaidi/app2-api:latest"
          echo "=== Commande de deploiement ==="
          echo "kubectl apply -f k8s/"